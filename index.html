<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Anti-cache -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Nowa apka · mini-klik.pl</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&amp;family=EB+Garamond:wght@400;500;600&amp;display=swap" rel="stylesheet">

<style>
:root{
  --paper-1:#f4e8c8;
  --paper-2:#eaddb8;
  --paper-3:#dcc9a0;
  --gold:#a04510;
  --gold-soft:#c26a30;
  --ink:#3a2810;
  --ink-soft:#6a4a20;
  --ink-muted:#8a7050;
  --indigo:#3a4a8c;
  --crimson:#c02040;
  --shadow-deep:0 6px 18px rgba(60,40,20,0.4);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'EB Garamond',serif;background:var(--paper-1)}

#mapa{
  position:fixed;
  inset:0;
  z-index:1;
}

/* ═══ KROPKA UŻYTKOWNIKA (twoja pozycja) ═══ */
.user-position-marker{background:transparent!important;border:none!important}
.user-dot{
  width:18px;height:18px;
  background:var(--indigo);
  border:3px solid var(--paper-2);
  border-radius:50%;
  box-shadow:0 0 0 2px var(--indigo), 0 4px 12px rgba(60,40,20,0.5);
  position:relative;
}
.user-dot::before{
  content:'';
  position:absolute;
  top:-12px;left:-12px;
  width:36px;height:36px;
  background:rgba(58,74,140,0.3);
  border-radius:50%;
  animation:userPulse 2s ease-out infinite;
}
@keyframes userPulse{
  0%{transform:scale(0.5);opacity:1}
  100%{transform:scale(2.5);opacity:0}
}

/* ═══ PIONOWA KOLUMNA PRZYCISKÓW PO LEWEJ ═══ */
.lewa-kolumna{
  position:fixed;
  top:14px;left:14px;
  z-index:600;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.kolumna-btn{
  width:44px;height:44px;
  border-radius:50%;
  border:2px solid var(--paper-2);
  cursor:pointer;
  font-size:20px;
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2px rgba(60,40,20,0.35), var(--shadow-deep);
  transition:all 0.2s;
  font-family:inherit;
  padding:0;
}
.kolumna-btn:hover{transform:scale(1.08)}
.kolumna-btn:active{transform:scale(0.95)}

/* Kolory (jak w grze plenerowej — start/tajemnice) */
.kolumna-btn.start{background:var(--crimson);box-shadow:0 0 0 2px var(--crimson), var(--shadow-deep)}
.kolumna-btn.odkryta{background:#3a8f5a;box-shadow:0 0 0 2px #3a8f5a, var(--shadow-deep)}
.kolumna-btn.tajemnica{background:#e8a844;color:#3a2810;box-shadow:0 0 0 2px #a04510, var(--shadow-deep)}

/* ═══ TRYB KIESZONKOWY 🌙 (nad GPS) ═══ */
.pocket-btn{
  position:fixed;
  bottom:70px;left:14px;
  z-index:500;
  width:46px;height:46px;
  background:var(--paper-2);
  border:2px solid var(--gold);border-radius:50%;
  cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-deep);
  transition:all 0.25s;color:var(--gold);font-family:inherit;
}
.pocket-btn:hover{background:var(--gold);color:var(--paper-2);transform:scale(1.05)}

/* ═══ WYGASZACZ EKRANU (tryb kieszonkowy) — dokładnie z gry plenerowej ═══ */
.wygaszacz{
  position:fixed;inset:0;
  z-index:100001;
  background:#000;
  display:none;
  flex-direction:column;
  align-items:center;justify-content:center;
  gap:26px;
  touch-action:none;
  user-select:none;-webkit-user-select:none;
  -webkit-touch-callout:none;
  cursor:default;
}
.wygaszacz.aktywny{display:flex}
.wygaszacz-zegar{
  font-family:'Cormorant Garamond',serif;
  font-size:54px;font-weight:500;letter-spacing:2px;
  color:#4b5563;
}
.wygaszacz-status{
  max-width:80vw;text-align:center;
  font-family:'EB Garamond',serif;
  font-size:15px;color:#6b7280;font-style:italic;
}
.wygaszacz-odblokuj{
  position:relative;overflow:hidden;
  width:190px;padding:16px 10px;
  background:#111827;
  border:1.5px solid #374151;border-radius:30px;
  color:#9ca3af;font-family:'EB Garamond',serif;font-size:15px;
  cursor:pointer;touch-action:none;
  -webkit-tap-highlight-color:transparent;
}
.wygaszacz-odblokuj-fill{
  position:absolute;inset:0;width:0;
  background:rgba(160,69,16,0.5);
}
.wygaszacz-odblokuj.trzymam .wygaszacz-odblokuj-fill{
  width:100%;
  transition:width 1s linear;
}
.wygaszacz-odblokuj-tekst{position:relative;z-index:1;line-height:1.35}
.wygaszacz-hint{
  max-width:82vw;text-align:center;
  font-size:11.5px;line-height:1.5;color:#374151;
  font-family:'EB Garamond',serif;
}

/* ═══ DOLNY PRZYCISK: GPS (włącz nawigację) ═══ */
.gps-btn{
  position:fixed;
  bottom:14px;left:14px;
  z-index:500;
  width:46px;height:46px;
  background:var(--paper-2);
  border:2px solid var(--gold);
  border-radius:50%;
  cursor:pointer;
  font-size:20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-deep);
  transition:all 0.25s;
  color:var(--gold);
  font-family:inherit;
}
.gps-btn:hover{background:var(--gold);color:var(--paper-2);transform:scale(1.05)}
.gps-btn.active{background:var(--gold);color:var(--paper-2)}
.gps-btn.szukam{animation:pulseGold 1.2s ease-in-out infinite}
@keyframes pulseGold{
  0%,100%{box-shadow:var(--shadow-deep)}
  50%{box-shadow:0 0 0 8px rgba(160,69,16,0.25), var(--shadow-deep)}
}
.gps-btn.error{
  background:#fef0e6;color:var(--crimson);border-color:var(--crimson);
}

/* ═══ DOLNY PRZYCISK: WYŚRODKUJ (pokazuje się gdy jest GPS) ═══ */
.center-btn{
  position:fixed;
  bottom:14px;left:70px;
  z-index:500;
  width:46px;height:46px;
  background:var(--paper-2);
  border:2px solid var(--gold);
  border-radius:50%;
  cursor:pointer;
  font-size:22px;
  font-weight:600;
  display:none;
  align-items:center;justify-content:center;
  box-shadow:var(--shadow-deep);
  transition:all 0.25s;
  color:var(--gold);
  font-family:inherit;
  line-height:1;
}
.center-btn:hover{background:var(--gold);color:var(--paper-2);transform:scale(1.05)}
.center-btn:active{transform:scale(0.95)}
.center-btn.sledzi{
  background:var(--gold);color:var(--paper-2);
  animation:pulseSledzi 1.6s ease-in-out infinite;
}
@keyframes pulseSledzi{
  0%, 100%{box-shadow:0 0 0 0 rgba(160,69,16,0.5)}
  50%{box-shadow:0 0 0 8px rgba(160,69,16,0)}
}

/* ═══ PANEL MENU (wysuwa się z lewej po kliknięciu pierwszego przycisku) ═══ */
.menu-overlay{
  position:fixed;inset:0;
  z-index:9000;
  background:rgba(60,40,20,0.55);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
.menu-overlay.visible{opacity:1;pointer-events:auto}
.menu-panel{
  position:absolute;
  top:0;left:0;bottom:0;
  width:84%;
  max-width:340px;
  background:linear-gradient(180deg,var(--paper-2) 0%,var(--paper-3) 100%);
  box-shadow:4px 0 20px rgba(60,40,20,0.25);
  transform:translateX(-100%);
  transition:transform 0.3s cubic-bezier(0.34, 1.0, 0.64, 1);
  overflow-y:auto;
  padding:20px 18px 30px;
  -webkit-overflow-scrolling:touch;
}
.menu-overlay.visible .menu-panel{transform:translateX(0)}
.menu-panel h2{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;color:var(--gold);font-weight:600;
  margin:4px 0 18px;
  border-bottom:1px solid var(--gold);
  padding-bottom:10px;
  text-align:center;letter-spacing:2px;
}
.menu-close{
  position:absolute;
  top:12px;right:14px;
  background:transparent;border:none;
  color:var(--gold);font-size:22px;
  cursor:pointer;padding:6px 10px;line-height:1;
}
.menu-close:hover{color:var(--ink)}
.menu-panel label{
  display:block;
  font-family:'Cormorant Garamond',serif;
  font-size:12px;color:var(--gold);
  letter-spacing:2px;text-transform:uppercase;
  margin:12px 0 8px;font-weight:600;
}
.menu-panel textarea{
  width:100%;
  min-height:200px;
  background:var(--paper-1);
  border:1px solid var(--gold);
  border-radius:6px;
  padding:12px;
  font-family:'EB Garamond',serif;
  font-size:15px;
  color:var(--ink);
  resize:vertical;
  line-height:1.5;
}
.menu-panel textarea:focus{outline:none;border-color:var(--gold-soft);box-shadow:0 0 0 3px rgba(160,69,16,0.15)}
.menu-panel .btn-zapisz{
  display:block;
  width:100%;
  margin-top:14px;
  background:var(--gold);
  color:var(--paper-2);
  border:none;
  border-radius:8px;
  padding:14px;
  font-family:'EB Garamond',serif;
  font-size:15px;font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:1px;
}
.menu-panel .btn-zapisz:hover{background:var(--gold-soft);transform:translateY(-1px)}
.menu-panel .btn-zapisz.zapisano{background:#3a8f5a}
.menu-panel .pomoc{
  font-size:12px;color:var(--ink-soft);
  font-style:italic;margin-top:8px;
  line-height:1.5;
}

/* ═══ MODAL POWITALNY (opis z entera pod sobą) ═══ */
.powitanie-overlay{
  position:fixed;inset:0;
  z-index:9500;
  background:rgba(60,40,20,0.65);
  display:none;
  align-items:center;justify-content:center;
  padding:20px;
  opacity:0;
  transition:opacity 0.4s;
}
.powitanie-overlay.visible{display:flex;opacity:1}
.powitanie-karta{
  background:linear-gradient(180deg,var(--paper-1) 0%,var(--paper-2) 100%);
  border:3px solid var(--gold);
  border-radius:12px;
  padding:0 0 26px;
  max-width:480px;
  width:100%;
  max-height:88vh;
  overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  position:relative;
  transform:scale(0.9);
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.powitanie-overlay.visible .powitanie-karta{transform:scale(1)}
.powitanie-karta::before,
.powitanie-karta::after{
  content:'';position:absolute;width:22px;height:22px;
  border:2px solid var(--gold);
  z-index:2;
}
.powitanie-karta::before{top:6px;left:6px;border-right:none;border-bottom:none}
.powitanie-karta::after{bottom:6px;right:6px;border-left:none;border-top:none}
.powitanie-obraz-wrap{
  display:none;
  width:100%;
  max-height:220px;
  overflow:hidden;
  border-radius:9px 9px 0 0;
  border-bottom:2px solid var(--gold);
  position:relative;
}
.powitanie-obraz-wrap.wyswietl{display:block}
.powitanie-obraz{
  width:100%;
  height:auto;
  display:block;
}
.powitanie-tresc{
  font-family:'EB Garamond',serif;
  font-size:17px;
  line-height:1.7;
  color:var(--ink);
  white-space:pre-wrap;
  text-align:center;
  margin:24px 30px 22px;
}
.powitanie-zamknij{
  display:block;
  margin:0 auto;
  background:var(--gold);
  color:var(--paper-2);
  border:none;
  border-radius:24px;
  padding:12px 34px;
  font-family:'EB Garamond',serif;
  font-size:15px;font-weight:600;
  cursor:pointer;
  letter-spacing:2px;
  transition:all 0.2s;
}
.powitanie-zamknij:hover{background:var(--gold-soft);transform:translateY(-1px)}

/* Info-block w panelu edycji (instrukcja o intro.jpg) */
.info-block{
  margin-top:14px;
  padding:12px 14px;
  background:rgba(160,69,16,0.08);
  border-left:3px solid var(--gold);
  border-radius:4px;
  font-size:13px;
  line-height:1.5;
  color:var(--ink-soft);
}
.info-block strong{color:var(--gold);font-weight:600}
.info-block code{
  background:var(--paper-1);
  padding:1px 6px;
  border-radius:3px;
  border:1px solid rgba(160,69,16,0.25);
  font-family:'JetBrains Mono',Consolas,monospace;
  font-size:12px;
  color:var(--gold);
}
.btn-podglad{
  display:block;
  width:100%;
  margin-top:10px;
  background:var(--paper-1);
  color:var(--gold);
  border:1px solid var(--gold);
  border-radius:8px;
  padding:12px;
  font-family:'EB Garamond',serif;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:1px;
}
.btn-podglad:hover{background:var(--gold);color:var(--paper-2)}

/* ══════════════════════════════════════════════════════
   PANEL "Nowa kropka audio" — skopiowany z audio przewodnika
   Sam widok bez funkcji, przyciski są klikalne (toggle active)
   ══════════════════════════════════════════════════════ */
.admin-helper{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  background:linear-gradient(180deg,var(--paper-2) 0%,var(--paper-3) 100%);
  border:3px solid #7c3aed;
  border-radius:8px;
  padding:24px 26px;
  box-shadow:var(--shadow-deep), 0 0 0 9999px rgba(60,40,20,0.55);
  z-index:10000;
  max-width:460px;
  width:calc(100% - 40px);
  max-height:88vh;
  overflow-y:auto;
  font-family:'EB Garamond',serif;
  opacity:0;
  pointer-events:none;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.admin-helper.visible{
  opacity:1;
  pointer-events:auto;
  transform:translate(-50%,-50%) scale(1);
}
.admin-helper::before,.admin-helper::after{
  content:'';position:absolute;width:22px;height:22px;
  border:2px solid #7c3aed;
}
.admin-helper::before{top:6px;left:6px;border-right:none;border-bottom:none}
.admin-helper::after{bottom:6px;right:6px;border-left:none;border-top:none}
.admin-helper h3{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;color:var(--ink);font-weight:600;
  margin-bottom:6px;
  display:flex;align-items:center;gap:10px;
}
.admin-helper h3::before{content:'🎧';font-size:22px}
.admin-helper .admin-subtitle{
  font-style:italic;color:var(--ink-soft);font-size:13px;
  margin-bottom:16px;
}

.admin-helper .form-row{
  display:grid;grid-template-columns:90px 1fr;gap:10px;
  align-items:center;margin-bottom:10px;
}
.admin-helper .form-row label{
  font-family:'EB Garamond',serif;font-size:11px;letter-spacing:1.5px;
  color:#7c3aed;font-weight:700;text-transform:uppercase;
}
.admin-helper input[type="text"],
.admin-helper input[type="number"]{
  background:var(--paper-2);
  color:var(--ink);
  border:1px solid rgba(124,58,237,0.4);
  border-radius:4px;
  padding:8px 10px;
  font-family:'EB Garamond',serif;font-size:14px;
  font-weight:500;width:100%;
  transition:all 0.2s;
}
.admin-helper input:focus{
  outline:none;border-color:#7c3aed;
  box-shadow:0 0 0 3px rgba(124,58,237,0.15);
}
.admin-helper input[type="range"]{width:100%;accent-color:#7c3aed}
.admin-helper .promien-display{
  font-family:'EB Garamond',serif;color:#7c3aed;
  font-size:13px;letter-spacing:1px;font-weight:600;
  text-align:right;margin-top:-6px;margin-bottom:8px;
}
.admin-helper .actions{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;
  align-items:center;
}
.admin-helper button.gl-btn{
  flex:1;min-width:130px;
  background:#7c3aed;color:#fff;
  border:none;border-radius:4px;
  padding:11px 16px;cursor:pointer;
  font-family:'EB Garamond',serif;font-size:11px;letter-spacing:1.5px;
  font-weight:700;text-transform:uppercase;
  transition:all 0.2s;
}
.admin-helper button.gl-btn:hover{
  background:#5b21b6;transform:translateY(-1px);
  box-shadow:0 4px 10px rgba(124,58,237,0.4);
}
.admin-helper button.gl-btn.secondary{
  background:transparent;color:#7c3aed;
  border:1px solid #7c3aed;
}
.admin-helper button.gl-btn.secondary:hover{
  background:rgba(124,58,237,0.1);
}
.admin-helper #adminTrybLinkBtn{
  padding:8px 18px;font-family:'EB Garamond',serif;font-size:13px;
  background:var(--paper-2);color:#7c3aed;
  border:1px solid #7c3aed;border-radius:4px;cursor:pointer;
  letter-spacing:1px;font-weight:600;
}

/* Przełącznik typu (Wiersz/Tło audio) */
.typ-kropki-wybor{display:flex;gap:8px;margin-bottom:14px}
.admin-helper .typ-kropki-wybor button.typ-kropki-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  padding:10px 6px;
  background:var(--paper-2);color:var(--ink);
  border:2px solid rgba(160,69,16,0.3);
  border-radius:6px;cursor:pointer;
  font-family:'EB Garamond',serif;
  transition:all 0.2s;min-height:64px;
}
.admin-helper .typ-kropki-wybor button.typ-kropki-btn:hover{
  background:var(--paper-3);border-color:var(--gold);
}
.admin-helper .typ-kropki-wybor button.typ-kropki-btn.active[data-typ="wiersz"]{
  background:linear-gradient(135deg, #a78bfa, #7c3aed);
  border-color:#5b21b6;color:#fff;
  box-shadow:0 3px 10px rgba(124,58,237,0.4);
}
.admin-helper .typ-kropki-wybor button.typ-kropki-btn.active[data-typ="tlo"]{
  background:linear-gradient(135deg, #4ade80, #16a34a);
  border-color:#15803d;color:#fff;
  box-shadow:0 3px 10px rgba(22,163,74,0.4);
}
.typ-kropki-ikona{font-size:20px;line-height:1}
.typ-kropki-label{font-family:'EB Garamond',serif;font-size:12px;letter-spacing:1px;font-weight:700;text-transform:uppercase}
.typ-kropki-podtytul{font-size:9.5px;opacity:0.8;font-style:italic}

/* Przełącznik kształtu (Okrąg/Rysuj/Ścieżka) */
.ksztalt-kropki-wybor{display:flex;gap:8px;margin-bottom:14px}
.admin-helper .ksztalt-kropki-wybor button.ksztalt-kropki-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  padding:10px 6px;
  background:var(--paper-2);color:var(--ink);
  border:2px solid rgba(160,69,16,0.3);
  border-radius:6px;cursor:pointer;
  font-family:'EB Garamond',serif;
  transition:all 0.2s;min-height:64px;
}
.admin-helper .ksztalt-kropki-wybor button.ksztalt-kropki-btn:hover{
  background:var(--paper-3);border-color:var(--gold);
}
.admin-helper .ksztalt-kropki-wybor button.ksztalt-kropki-btn.active{
  background:linear-gradient(135deg, #d97a30, #a04510);
  border-color:#7a3408;color:#fff;
  box-shadow:0 3px 10px rgba(160,69,16,0.4);
}
.ksztalt-kropki-ikona{font-size:20px;line-height:1}
.ksztalt-kropki-label{font-family:'EB Garamond',serif;font-size:12px;letter-spacing:1px;font-weight:700;text-transform:uppercase}
.ksztalt-kropki-podtytul{font-size:9.5px;opacity:0.8;font-style:italic}

/* Przełącznik rozmiaru markera */
.rozmiar-wybor{display:flex;gap:6px;flex:1}
.admin-helper .rozmiar-wybor button.rozmiar-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  padding:8px 6px;
  background:var(--paper-2);color:var(--ink);
  border:1px solid rgba(160,69,16,0.4);
  border-radius:6px;cursor:pointer;
  font-family:'EB Garamond',serif;
  transition:all 0.2s;min-height:54px;
}
.admin-helper .rozmiar-wybor button.rozmiar-btn:hover{
  background:var(--paper-3);border-color:var(--gold);
}

<body class="">

  <button class="wygaszacz-odblokuj" id="wygaszaczOdblokuj" onmousedown="wygaszaczStartOdblokuj(event)" ontouchstart="wygaszaczStartOdblokuj(event)" onmouseup="wygaszaczAnulujOdblokuj()" onmouseleave="wygaszaczAnulujOdblokuj()" ontouchend="wygaszaczAnulujOdblokuj()" ontouchcancel="wygaszaczAnulujOdblokuj()">
    <span class="wygaszacz-odblokuj-fill"></span>

</div>

<!-- Toast -->
<div class="toast visible" id="toast">✅ Kropka #1 zaktualizowana</div>

<!-- (panel admina usunięty w wersji publicznej) -->

<script>
/* ══════════════════════════════════════════════════════
   MAPA — Leaflet, OpenStreetMap
   ══════════════════════════════════════════════════════ */
const mapa = L.map('mapa', {
  zoomControl: true,
  attributionControl: true
}).setView([52.0, 19.4], 6); // Polska - domyślny widok

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(mapa);

// Po pierwszym otwarciu spróbuj przybliżyć na pozycję urządzenia (bez uruchamiania śledzenia)
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    p => { if (watchId === null) mapa.setView([p.coords.latitude, p.coords.longitude], 13); },
    () => {},
    { timeout: 6000 }
  );
}

/* ══════════════════════════════════════════════════════
   GPS — watchPosition + auto-center + wakeLock
   ══════════════════════════════════════════════════════ */
let userPozycja = null;
let userMarker = null;
let watchId = null;
let autoCenterAktywny = true;
let mapaProgramowoPrzesuwana = false;

const gpsBtn = document.getElementById('gpsBtn');
const centerBtn = document.getElementById('centerBtn');

function ikonaUzytkownika() {
  return L.divIcon({
    className: 'user-position-marker',
    html: '<div class="user-dot"></div>',
    iconSize: [18, 18],
    iconAnchor: [9, 9]
  });
}

function togglePozycja() {
  if (watchId !== null) {
    zatrzymajGps();
    return;
  }
  if (!navigator.geolocation) {
    toast('Twoje urządzenie nie udostępnia lokalizacji.');
    return;
  }

  gpsBtn.classList.add('szukam');
  gpsBtn.textContent = '🔎';

  // FAZA 1: szybki fix (naziemny) - żeby coś się od razu pojawiło
  navigator.geolocation.getCurrentPosition(
    pokazPozycje,
    () => {},
    { enableHighAccuracy: false, maximumAge: 30000, timeout: 5000 }
  );

  // FAZA 2: dokładny GPS satelitarny w tle, śledzenie na żywo
  watchId = navigator.geolocation.watchPosition(
    pokazPozycje,
    bladPozycji,
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 2147483647 }
  );

  zalozWakeLock();
}

function zatrzymajGps() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  if (userMarker) {
    mapa.removeLayer(userMarker);
    userMarker = null;
  }
  userPozycja = null;
  autoCenterAktywny = true;
  gpsBtn.classList.remove('szukam', 'active', 'error');
  gpsBtn.textContent = '🧭';
  gpsBtn.title = 'Włącz nawigację GPS';
  centerBtn.style.display = 'none';
  centerBtn.classList.remove('sledzi');
  zwolnijWakeLock();
  toast('Nawigacja wyłączona');
}

function pokazPozycje(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  const pierwszyFix = !userPozycja;
  userPozycja = { lat, lng };

  if (!userMarker) {
    userMarker = L.marker([lat, lng], { icon: ikonaUzytkownika(), zIndexOffset: 1000 }).addTo(mapa);
    userMarker.bindPopup('<b>Tu jesteś</b>');
    mapaProgramowoPrzesuwana = true;
    mapa.flyTo([lat, lng], 15, { duration: 1.2 });
    setTimeout(() => { mapaProgramowoPrzesuwana = false; }, 1400);
  } else {
    userMarker.setLatLng([lat, lng]);
    if (autoCenterAktywny) {
      mapaProgramowoPrzesuwana = true;
      mapa.panTo([lat, lng], { animate: true, duration: 0.8 });
      setTimeout(() => { mapaProgramowoPrzesuwana = false; }, 900);
    }
  }

  gpsBtn.classList.remove('szukam', 'error');
  gpsBtn.classList.add('active');
  gpsBtn.textContent = '🛑';
  gpsBtn.title = 'Wyłącz nawigację';

  centerBtn.style.display = 'flex';
  aktualizujPrzyciskCenter();

  // ODTWARZANIE AUDIO ZE STREF
  sprawdzStrefyAudio();
}

function bladPozycji(err) {
  // Timeout (kod 3) ignorujemy - watchPosition pracuje dalej
  if (err.code === 3) return;
  gpsBtn.classList.remove('szukam', 'active');
  gpsBtn.classList.add('error');
  gpsBtn.textContent = '⚠️';
  toast('Nie mogę ustalić pozycji. Sprawdź zgodę na lokalizację.');
}

function wysrodkujNaMnie() {
  if (!userPozycja) return;
  autoCenterAktywny = true;
  aktualizujPrzyciskCenter();
  const docelowyZoom = Math.max(mapa.getZoom(), 16);
  mapaProgramowoPrzesuwana = true;
  mapa.flyTo([userPozycja.lat, userPozycja.lng], docelowyZoom, { duration: 0.8 });
  setTimeout(() => { mapaProgramowoPrzesuwana = false; }, 1000);
}

function aktualizujPrzyciskCenter() {
  centerBtn.classList.toggle('sledzi', autoCenterAktywny);
}

// Gdy user przeciągnie mapę - wyłącz auto-podążanie
mapa.on('dragstart', () => {
  if (mapaProgramowoPrzesuwana) return;
  autoCenterAktywny = false;
  aktualizujPrzyciskCenter();
});

/* ══════════════════════════════════════════════════════
   WAKE LOCK — trzymaj ekran włączony podczas GPS
   ══════════════════════════════════════════════════════ */
let wakeLockSentinel = null;
let wakeLockToastPokazany = false;

async function zalozWakeLock() {
  if (!('wakeLock' in navigator)) {
    if (!wakeLockToastPokazany) {
      wakeLockToastPokazany = true;
      toast('Twój telefon może wygaszać ekran. Wydłuż czas w ustawieniach.');
    }
    return;
  }
  if (wakeLockSentinel) return;
  try {
    wakeLockSentinel = await navigator.wakeLock.request('screen');
    wakeLockSentinel.addEventListener('release', () => { wakeLockSentinel = null; });
    if (!wakeLockToastPokazany) {
      wakeLockToastPokazany = true;
      toast('Ekran nie zgaśnie. Możesz przyciemnić jasność.');
    }
  } catch (e) { console.warn('WakeLock:', e); wakeLockSentinel = null; }
}

function zwolnijWakeLock() {
  if (!wakeLockSentinel) return;
  try { wakeLockSentinel.release(); } catch (e) {}
  wakeLockSentinel = null;
}

// Powrót do karty (z tła) - załóż wakelock ponownie + świeża pozycja
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  if (watchId === null) return;
  zalozWakeLock();
  try {
    navigator.geolocation.getCurrentPosition(pokazPozycje, () => {},
      { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
  } catch (e) {}
});

/* ══════════════════════════════════════════════════════
   TOAST — komunikaty
   ══════════════════════════════════════════════════════ */
let toastTimeout = null;
function toast(tekst, czas = 3000) {
  const t = document.getElementById('toast');
  t.textContent = tekst;
  t.classList.add('visible');
  if (toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('visible'), czas);
}

/* ══════════════════════════════════════════════════════
   MENU (wysuwane z lewej) + edycja opisu powitalnego
   ══════════════════════════════════════════════════════
   Opis zapisany w localStorage. Przy każdym otwarciu apki
   modal powitalny wyświetla się z tym tekstem. Entery są
   zachowane — każda linia jest pod poprzednią.
   ══════════════════════════════════════════════════════ */
const KEY_OPIS = 'nowa_apka_opis';

function otworzMenu() {
  const overlay = document.getElementById('menuOverlay');
  const pole = document.getElementById('polOpis');
  // Wczytaj aktualny opis do pola
  pole.value = localStorage.getItem(KEY_OPIS) || '';
  overlay.classList.add('visible');
}

function zamknijMenu() {
  document.getElementById('menuOverlay').classList.remove('visible');
}

function zapiszOpis() {
  const pole = document.getElementById('polOpis');
  const btn = document.getElementById('btnZapiszOpis');
  const tekst = pole.value.trim();
  try {
    if (tekst) localStorage.setItem(KEY_OPIS, tekst);
    else localStorage.removeItem(KEY_OPIS);
    // Wizualne potwierdzenie
    btn.classList.add('zapisano');
    btn.textContent = '✓ Zapisano';
    setTimeout(() => {
      btn.classList.remove('zapisano');
      btn.textContent = '💾 Zapisz';
    }, 1500);
    toast('💾 Opis zapisany');
  } catch (e) {
    toast('Nie udało się zapisać: ' + (e.message || 'błąd'));
  }
}

function pokazPowitanie() {
  // Priorytet: TEKST_POWITALNY (wbudowany w plik) > localStorage (brudnopis)
  const tekst = (TEKST_POWITALNY && TEKST_POWITALNY.trim()) ? TEKST_POWITALNY : (localStorage.getItem(KEY_OPIS) || '');
  if (!tekst || !tekst.trim()) return;
  document.getElementById('powitanieTresc').textContent = tekst;
  document.getElementById('powitanieOverlay').classList.add('visible');
  zaladujObrazTla();
}

function pokazPodglad() {
  const pole = document.getElementById('polOpis');
  const tekst = (pole.value || '').trim();
  if (!tekst) { toast('Wpisz najpierw opis'); return; }
  document.getElementById('powitanieTresc').textContent = tekst;
  document.getElementById('powitanieOverlay').classList.add('visible');
  zaladujObrazTla();
  zamknijMenu();
}

function zamknijPowitanie() {
  document.getElementById('powitanieOverlay').classList.remove('visible');
}

/* Próbuje załadować obraz tła z folderu img/.
   Kolejność: intro.jpg → intro.png → intro.webp → intro.gif.
   Jeśli żaden nie istnieje, sekcja obrazu zostaje ukryta. */
function zaladujObrazTla() {
  const wrap = document.getElementById('powitanieObrazWrap');
  const img = document.getElementById('powitanieObraz');
  const kolejnosc = ['img/intro.jpg', 'img/intro.png', 'img/intro.webp', 'img/intro.gif'];
  let i = 0;
  wrap.classList.remove('wyswietl');

  function probuj() {
    if (i >= kolejnosc.length) {
      wrap.classList.remove('wyswietl'); // żaden nie działa - ukryj sekcję
      return;
    }
    const test = new Image();
    test.onload = () => {
      img.src = kolejnosc[i];
      wrap.classList.add('wyswietl');
    };
    test.onerror = () => { i++; probuj(); };
    test.src = kolejnosc[i];
  }
  probuj();
}

// Pokaż modal powitalny przy załadowaniu strony
setTimeout(pokazPowitanie, 500);

/* ══════════════════════════════════════════════════════
   PANEL "Nowa kropka audio" — sam widok bez logiki
   Funkcje do dorobienia w kolejnych krokach
   ══════════════════════════════════════════════════════ */
function otworzPanelAudio() {
  document.getElementById('adminHelper').classList.add('visible');
}
function zamknijPanelAudio() {
  document.getElementById('adminHelper').classList.remove('visible');
}

// Toggle klasy active w przełącznikach (tylko wizualnie)
function _toggleTyp(btn) {
  document.querySelectorAll('.typ-kropki-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function _toggleKsztalt(btn) {
  document.querySelectorAll('.ksztalt-kropki-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const promienBlok = document.getElementById('adminPromienBlok');
  const ksztalt = btn.getAttribute('data-ksztalt');
  promienBlok.style.display = (ksztalt === 'kolo') ? '' : 'none';
}
function _toggleRozmiar(btn) {
  document.querySelectorAll('.rozmiar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

/* ══════════════════════════════════════════════════════
   DODAWANIE KROPKI TŁA AUDIO (kształt: okrąg)
   Klik "Dodaj" → klik w mapę → fioletowa kropka + okrąg

   Model danych (jak w audio przewodniku):
   - KROPKI_WBUDOWANE = kropki zaszyte w HTML (wgrane na serwer,
     widoczne dla wszystkich którzy otworzą Twój link).
   - localStorage = brudnopis edycji które JESZCZE nie zostały
     wbudowane w HTML. Znikają po "Zapisz HTML" i wgraniu pliku.
   ══════════════════════════════════════════════════════ */
const KROPKI_WBUDOWANE = [
  { id: 1784549172595, numer: 1, lat: 51.19549, lng: 23.16433, promien: 2400, opis: '', link: '' }
];  // ← ta tablica zostaje podmieniona przez "Zapisz HTML"
const TEKST_POWITALNY = 'ok dobra\nsiedliszcze - ok\n\nmapa ulix';   // ← tekst powitalny zostaje podmieniony przez "Zapisz HTML"

const KEY_KROPKI = 'nowa_apka_kropki_audio';
let kropkiAudio = [];
let trybDodawania = false;
let daneNowejKropki = null;

// Klik "Dodaj" w panelu
function rozpocznijDodawanieKropki() {
  const panel = document.getElementById('adminHelper');
  const numer = panel.querySelector('input[type="number"]').value || '1';
  const inputy = panel.querySelectorAll('input[type="text"]');
  const link = inputy[0].value.trim();
  const opis = inputy[1].value.trim();
  const promien = parseInt(document.getElementById('adminPromien').value) || 300;

  daneNowejKropki = {
    id: Date.now(),
    numer: parseInt(numer),
    link, opis, promien
  };

  trybDodawania = true;
  document.body.classList.add('mapa-tryb-dodawania');
  zamknijPanelAudio();
  toast('👆 Kliknij w mapę, aby ustawić kropkę');
}

// Klik w mapę - dodaje kropkę jeśli tryb aktywny
mapa.on('click', (e) => {
  if (!trybDodawania || !daneNowejKropki) return;

  const kropka = Object.assign({}, daneNowejKropki, {
    lat: e.latlng.lat,
    lng: e.latlng.lng
  });

  kropkiAudio.push(kropka);
  zapiszKropki();
  narysujKropke(kropka);

  trybDodawania = false;
  daneNowejKropki = null;
  document.body.classList.remove('mapa-tryb-dodawania');
  toast('✅ Kropka #' + kropka.numer + ' dodana');
});

// Rysowanie kropki na mapie + okrąg
function narysujKropke(k) {
  const ikona = L.divIcon({
    className: 'kropka-tlo-audio-marker',
    html: '<div class="kropka-tlo-audio-dot">' + k.numer + '</div>',
    iconSize: [30, 30],
    iconAnchor: [15, 15]
  });
  const marker = L.marker([k.lat, k.lng], { icon: ikona }).addTo(mapa);
  const okrag = L.circle([k.lat, k.lng], {
    radius: k.promien,
    color: '#7c3aed',
    fillColor: '#7c3aed',
    fillOpacity: 0.12,
    weight: 2
  }).addTo(mapa);

  // W wersji publicznej płatki nie istnieją - pokaż prosty popup
  marker.on('click', function() {
    if (document.getElementById('platkiWrapper')) {
      pokazNapisyKropki(k);
    } else {
      // Wersja publiczna - prosty popup z opisem
      let html = '<b style="color:#7c3aed">#' + k.numer + '</b>';
      if (k.opis) html += '<br>' + escHtml(k.opis);
      marker.bindPopup(html).openPopup();
    }
  });

  // Zapamiętaj referencje żeby móc usunąć
  k._marker = marker;
  k._okrag = okrag;
}

// Zapis do localStorage - TYLKO edycje (te które NIE są w KROPKI_WBUDOWANE)
function zapiszKropki() {
  try {
    const idyWbudowanych = new Set(KROPKI_WBUDOWANE.map(k => k.id));
    const doZapisu = kropkiAudio
      .filter(k => !idyWbudowanych.has(k.id))
      .map(k => ({
        id: k.id, numer: k.numer, opis: k.opis, link: k.link,
        promien: k.promien, lat: k.lat, lng: k.lng
      }));
    localStorage.setItem(KEY_KROPKI, JSON.stringify(doZapisu));
  } catch (e) { console.warn('Zapis:', e); }
}

// Ładowanie przy starcie - łączymy KROPKI_WBUDOWANE z localStorage
function zaladujKropki() {
  // Start: kropki wbudowane w plik (dla wszystkich którzy otworzą apkę)
  kropkiAudio = KROPKI_WBUDOWANE.slice();
  // Dodaj lokalne szkice (edycje jeszcze nie wbudowane w HTML)
  try {
    const zapisane = localStorage.getItem(KEY_KROPKI);
    if (zapisane) {
      const zLokal = JSON.parse(zapisane);
      const idSet = new Set(kropkiAudio.map(k => k.id));
      zLokal.forEach(k => {
        if (!idSet.has(k.id)) kropkiAudio.push(k);
      });
    }
  } catch (e) { console.warn('Ładowanie:', e); }
  // Wyrenderuj wszystko na mapie
  kropkiAudio.forEach(narysujKropke);
}

// Usuwanie kropki
function usunKropke(id) {
  if (!confirm('Usunąć tę kropkę?')) return;
  const idx = kropkiAudio.findIndex(k => k.id === id);
  if (idx === -1) return;
  const k = kropkiAudio[idx];
  if (k._marker) mapa.removeLayer(k._marker);
  if (k._okrag) mapa.removeLayer(k._okrag);
  kropkiAudio.splice(idx, 1);
  zapiszKropki();
  toast('🗑 Kropka usunięta');
}

// Pomocnicza - escape HTML
function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

/* ══════════════════════════════════════════════════════
   PŁATKI — okrągłe kółeczka wokół kropki na mapie
   ══════════════════════════════════════════════════════ */
let platkiId = null;

function pokazNapisyKropki(k) {
  platkiId = k.id;
  const pkt = mapa.latLngToContainerPoint([k.lat, k.lng]);
  const wrapper = document.getElementById('platkiWrapper');
  wrapper.style.left = pkt.x + 'px';
  wrapper.style.top = pkt.y + 'px';
  wrapper.classList.add('open');
  document.getElementById('platkiScrim').classList.add('open');
}

function ukryjPlatki() {
  document.getElementById('platkiWrapper').classList.remove('open');
  document.getElementById('platkiScrim').classList.remove('open');
  platkiId = null;
}

function platkiEdytuj() { const id = platkiId; ukryjPlatki(); edytujKropke(id); }
function platkiPromien() { const id = platkiId; ukryjPlatki(); dostrojPromien(id); }
function platkiUsun() { const id = platkiId; ukryjPlatki(); usunKropke(id); }

/* ══════════════════════════════════════════════════════
   PŁATEK: EDYTUJ — otwiera panel z danymi kropki
   ══════════════════════════════════════════════════════ */
let edytowaneId = null;

function edytujKropke(id) {
  const k = kropkiAudio.find(x => x.id === id);
  if (!k) return;
  mapa.closePopup();
  edytowaneId = id;

  // Wypełnij panel danymi kropki
  const panel = document.getElementById('adminHelper');
  panel.querySelector('input[type="number"]').value = k.numer || 1;
  const inputy = panel.querySelectorAll('input[type="text"]');
  inputy[0].value = k.link || '';
  inputy[1].value = k.opis || '';
  document.getElementById('adminPromien').value = k.promien || 300;
  document.getElementById('adminPromienVal').textContent = (k.promien || 300) + ' m';

  // Zmień przycisk Dodaj na Zapisz
  const btnDodaj = panel.querySelector('.gl-btn');
  btnDodaj.textContent = '💾 Zapisz zmiany';
  btnDodaj.onclick = function() { zapiszEdycjeKropki(); };

  otworzPanelAudio();
}

function zapiszEdycjeKropki() {
  if (!edytowaneId) return;
  const k = kropkiAudio.find(x => x.id === edytowaneId);
  if (!k) return;

  const panel = document.getElementById('adminHelper');
  k.numer = parseInt(panel.querySelector('input[type="number"]').value) || 1;
  const inputy = panel.querySelectorAll('input[type="text"]');
  k.link = inputy[0].value.trim();
  k.opis = inputy[1].value.trim();
  k.promien = parseInt(document.getElementById('adminPromien').value) || 300;

  // Usuń stary marker i okrąg, narysuj nowy
  if (k._marker) mapa.removeLayer(k._marker);
  if (k._okrag) mapa.removeLayer(k._okrag);
  narysujKropke(k);
  zapiszKropki();

  // Przywróć przycisk Dodaj
  const btnDodaj = panel.querySelector('.gl-btn');
  btnDodaj.textContent = '➕ Dodaj';
  btnDodaj.onclick = function() { rozpocznijDodawanieKropki(); };
  edytowaneId = null;

  zamknijPanelAudio();
  toast('✅ Kropka #' + k.numer + ' zaktualizowana');
}

/* ══════════════════════════════════════════════════════
   PŁATEK: PROMIEŃ — suwak na dole, live update okręgu
   ══════════════════════════════════════════════════════ */
let dostrajanaKropkaId = null;

function dostrojPromien(id) {
  const k = kropkiAudio.find(x => x.id === id);
  if (!k) return;

  dostrajanaKropkaId = id;
  const suwakEl = document.getElementById('suwakStrefy');
  const suwak = document.getElementById('suwakPromien');
  const val = document.getElementById('suwakPromienVal');
  suwak.value = k.promien || 300;
  val.textContent = (k.promien || 300) + ' m';

  suwak.oninput = function() {
    const nowyPromien = parseInt(this.value);
    val.textContent = nowyPromien + ' m';
    const kr = kropkiAudio.find(x => x.id === dostrajanaKropkaId);
    if (kr && kr._okrag) {
      kr._okrag.setRadius(nowyPromien);
      kr.promien = nowyPromien;
    }
  };

  suwakEl.classList.add('visible');
}

function zamknijSuwak() {
  document.getElementById('suwakStrefy').classList.remove('visible');
  // Zapisz aktualny promień
  if (dostrajanaKropkaId) {
    const k = kropkiAudio.find(x => x.id === dostrajanaKropkaId);
    if (k) {
      k.promien = parseInt(document.getElementById('suwakPromien').value) || 300;
      zapiszKropki();
      toast('📏 Promień #' + k.numer + ': ' + k.promien + ' m');
    }
  }
  dostrajanaKropkaId = null;
}

// Załaduj zapisane kropki przy starcie
zaladujKropki();

/* ══════════════════════════════════════════════════════
   ODTWARZANIE AUDIO ZE STREF
   Wywoływane z każdego ticku GPS. Zero zapytań serwera -
   iteracja po kropkiAudio w pamięci + porównanie odległości.
   ══════════════════════════════════════════════════════ */

let aktywnaStrefa = null;   // id kropki aktualnie grającej
let aktywnyAudio = null;    // element <audio>

// Odległość między dwoma punktami w metrach (Haversine)
function odlegloscMetry(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = Math.PI / 180;
  const dLat = (lat2 - lat1) * toRad;
  const dLng = (lng2 - lng1) * toRad;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*toRad) * Math.cos(lat2*toRad) *
            Math.sin(dLng/2)**2;
  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function sprawdzStrefyAudio() {
  if (!userPozycja) return;

  // Znajdź kropkę w której teraz jesteśmy (pierwsza pasująca)
  let wStrefie = null;
  for (const k of kropkiAudio) {
    if (typeof k.lat !== 'number' || typeof k.lng !== 'number') continue;
    const odl = odlegloscMetry(userPozycja.lat, userPozycja.lng, k.lat, k.lng);
    // +5m antydrgania dla strefy w której już jesteśmy (chroni przed migotaniem na granicy)
    const promien = (aktywnaStrefa === k.id) ? (k.promien + 5) : k.promien;
    if (odl <= promien) { wStrefie = k; break; }
  }

  // Jesteśmy w tej samej strefie co wcześniej - nic nie robimy
  if (wStrefie && aktywnaStrefa === wStrefie.id) return;

  // Wyjście ze strefy (albo zmiana strefy)
  if (aktywnyAudio) {
    try { aktywnyAudio.pause(); } catch (e) {}
    aktywnyAudio = null;
    aktywnaStrefa = null;
  }

  // Wejście w nową strefę
  if (wStrefie) {
    // Priorytet: pole "link" (pełny URL). Fallback: audio/{numer}.mp3
    const zrodlo = (wStrefie.link && wStrefie.link.trim())
      ? wStrefie.link.trim()
      : 'audio/' + wStrefie.numer + '.mp3';

    try {
      aktywnyAudio = new Audio(zrodlo);
      aktywnyAudio.loop = true;
      aktywnyAudio.volume = 0.7;
      aktywnyAudio.play().catch(err => {
        toast('❌ Nie mogę odtworzyć: ' + zrodlo);
        console.warn('Audio error:', err);
        aktywnyAudio = null;
        aktywnaStrefa = null;
      });
      aktywnaStrefa = wStrefie.id;
      toast('▶️ Strefa #' + wStrefie.numer + (wStrefie.opis ? ' - ' + wStrefie.opis : ''));
    } catch (e) {
      console.warn('Audio init error:', e);
    }
  } else {
    toast('⏸ Wyszedłeś ze strefy');
  }
}

/* ══════════════════════════════════════════════════════
   ZAPIS HTML — jak w audio przewodniku
   Bierze aktualne kropkiAudio, wbija je w tablicę
   KROPKI_WBUDOWANE w kodzie i pobiera nowy plik.
   Po wgraniu tego pliku na serwer, wszyscy widzą kropki.
   ══════════════════════════════════════════════════════ */
async function zapiszHTML() {
  if (!kropkiAudio.length) {
    if (!confirm('Nie masz żadnych kropek. Pobrać pustą wersję publiczną i tak?')) return;
  }

  try {
    // Escape dla stringów w kodzie JS
    const esc = s => (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '');

    // Zbuduj tablicę KROPKI_WBUDOWANE
    const linie = kropkiAudio.map(k => {
      const lat = (typeof k.lat === 'number' ? k.lat : 0).toFixed(5);
      const lng = (typeof k.lng === 'number' ? k.lng : 0).toFixed(5);
      const promien = k.promien || 300;
      const opis = esc(k.opis || '');
      const link = esc(k.link || '');
      return `  { id: ${k.id}, numer: ${k.numer}, lat: ${lat}, lng: ${lng}, promien: ${promien}, opis: '${opis}', link: '${link}' }`;
    });
    const nowaTablica = `const KROPKI_WBUDOWANE = [\n${linie.join(',\n')}\n];`;

    // Wbuduj tekst powitalny (z localStorage lub aktualnego pola)
    const opisTekst = (document.getElementById('polOpis').value || localStorage.getItem(KEY_OPIS) || '').trim();
    const nowyOpis = `const TEKST_POWITALNY = '${esc(opisTekst)}';`;

    // Pobierz aktualny HTML strony (surowy - z serwera, nie z DOM)
    let tekst;
    try {
      const adres = window.location.href.split('?')[0] + '?_=' + Date.now();
      const odpowiedz = await fetch(adres, { cache: 'no-store' });
      if (!odpowiedz.ok) throw new Error('HTTP ' + odpowiedz.status);
      tekst = await odpowiedz.text();
    } catch (fetchErr) {
      // FALLBACK: uruchomienie z file:// - fetch nie działa.
      console.warn('Fetch nieudany, fallback do outerHTML:', fetchErr.message);
      const mapaEl = document.getElementById('mapa');
      // Zapamiętaj i wyczyść wszystko co Leaflet dodał
      const mapaHtmlZapis = mapaEl.innerHTML;
      const mapaClassZapis = mapaEl.className;
      const mapaStyleZapis = mapaEl.getAttribute('style') || '';
      mapaEl.innerHTML = '';
      mapaEl.className = '';
      mapaEl.removeAttribute('style');
      mapaEl.removeAttribute('tabindex');
      // Ukryj elementy UI
      const ukryte = [];
      document.querySelectorAll('.menu-overlay, .powitanie-overlay, .admin-helper, .platki-wrapper, .platki-scrim, .suwak-strefy').forEach(el => {
        ukryte.push({el, display: el.style.display, cls: el.className});
        el.classList.remove('visible','open');
      });
      tekst = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
      // Przywróć DOM
      mapaEl.innerHTML = mapaHtmlZapis;
      mapaEl.className = mapaClassZapis;
      mapaEl.setAttribute('style', mapaStyleZapis);
      ukryte.forEach(u => { u.el.className = u.cls; u.el.style.display = u.display; });
    }

    // Podmień tablicę KROPKI_WBUDOWANE
    const regexKropki = /const\s+KROPKI_WBUDOWANE\s*=\s*\[[\s\S]*?\n?\];/;
    if (!regexKropki.test(tekst)) {
      alert('⚠️ Nie znaleziono tablicy KROPKI_WBUDOWANE w pliku HTML.');
      return;
    }
    tekst = tekst.replace(regexKropki, nowaTablica);

    // Podmień TEKST_POWITALNY
    const regexOpis = /const\s+TEKST_POWITALNY\s*=\s*'[^']*';/;
    if (regexOpis.test(tekst)) {
      tekst = tekst.replace(regexOpis, nowyOpis);
    }

    // === WYCIĘCIE PANELU ADMINA (wersja publiczna) ===
    // Bloki między <!-- (panel admina usunięty w wersji publicznej) --> znikają.
    // W wersji publicznej nie ma lewej kolumny, panelu audio, panelu edycji opisu.
    const regexAdmin = /<!--\s*ADMIN:START\s*-->[\s\S]*?<!--\s*ADMIN:END\s*-->/g;
    tekst = tekst.replace(regexAdmin, '<!-- (panel admina usunięty w wersji publicznej) -->');

    // Pobierz plik jako wersję publiczną
    const blob = new Blob([tekst], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'index-publiczny.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    setTimeout(() => {
      alert('🌍 Pobrano WERSJĘ PUBLICZNĄ: index-publiczny.html\n' +
            '(' + kropkiAudio.length + ' kropek, opis: ' + (opisTekst ? 'tak' : 'brak') + ')\n\n' +
            'Zmień nazwę na index.html i wgraj na serwer/GitHub.\n' +
            'Ten plik NIE MA panelu edytora — turyści widzą tylko mapę i kropki.\n\n' +
            'Twoja wersja robocza (z edytorem) pozostaje nietknięta.');
    }, 400);

  } catch (e) {
    console.error(e);
    alert('❌ Błąd eksportu: ' + (e.message || 'nieznany'));
  }
}

   LEWA KOLUMNA — pozostałe przyciski (placeholder)

/* ══════════════════════════════════════════════════════
   TRYB KIESZONKOWY 🌙 (wygaszacz ekranu) - z gry plenerowej
   ══════════════════════════════════════════════════════
   "Niby zgaszony" ekran: czarna zasłona blokuje przypadkowe
   dotknięcia (dłoń, kieszeń), a telefon NIE gasi ekranu
   naprawdę (wake lock) - GPS i dźwięki działają dalej.
   Odblokowanie: PRZYTRZYMANIE przycisku ~1s.
   ══════════════════════════════════════════════════════ */
let wygaszaczAktywny = false;
let _wygaszaczTimerOdblokuj = null;
let _wygaszaczInterval = null;

function wlaczWygaszacz() {
  const ov = document.getElementById('wygaszaczEkranu');
  if (!ov) return;
  wygaszaczAktywny = true;
  ov.classList.add('aktywny');
  document.body.style.overflow = 'hidden';
  zalozWakeLock();
  _wygaszaczOdswiez();
  _wygaszaczInterval = setInterval(_wygaszaczOdswiez, 4000);
}

function wylaczWygaszacz() {
  const ov = document.getElementById('wygaszaczEkranu');
  wygaszaczAktywny = false;
  if (ov) ov.classList.remove('aktywny');
  document.body.style.overflow = '';
  wygaszaczAnulujOdblokuj();
  if (_wygaszaczInterval) { clearInterval(_wygaszaczInterval); _wygaszaczInterval = null; }
  // Blokadę ekranu zwalniamy tylko gdy GPS nie działa
  if (watchId === null) zwolnijWakeLock();
}

// Palec dotknął przycisku: start paska postępu + timer 1s
function wygaszaczStartOdblokuj(e) {
  if (e && e.preventDefault) e.preventDefault();
  const btn = document.getElementById('wygaszaczOdblokuj');
  if (btn) btn.classList.add('trzymam');
  if (_wygaszaczTimerOdblokuj) clearTimeout(_wygaszaczTimerOdblokuj);
  _wygaszaczTimerOdblokuj = setTimeout(() => {
    _wygaszaczTimerOdblokuj = null;
    wylaczWygaszacz();
    if (navigator.vibrate) { try { navigator.vibrate(30); } catch (err) {} }
  }, 1000);
}

// Palec puścił / zjechał = anuluj
function wygaszaczAnulujOdblokuj() {
  if (_wygaszaczTimerOdblokuj) { clearTimeout(_wygaszaczTimerOdblokuj); _wygaszaczTimerOdblokuj = null; }
  const btn = document.getElementById('wygaszaczOdblokuj');
  if (btn) btn.classList.remove('trzymam');
}

// Zegar - aktualizowany co 4s
function _wygaszaczOdswiez() {
  const zegar = document.getElementById('wygaszaczZegar');
  if (zegar) {
    const t = new Date();
    zegar.textContent = String(t.getHours()).padStart(2, '0') + ':' +
                        String(t.getMinutes()).padStart(2, '0');
  }
}

// Desktop: Escape też odblokowuje
document.addEventListener('keydown', (e) => {
  if (wygaszaczAktywny && e.key === 'Escape') wylaczWygaszacz();
});
